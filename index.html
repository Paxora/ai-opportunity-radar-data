<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Opportunity Radar</title>
    <link rel="stylesheet" href="assets/style.css?v=20260703-ui5" />
    <style>
      .page-title h1 {
        white-space: nowrap !important;
        font-size: clamp(42px, 6.2vw, 86px) !important;
        letter-spacing: -0.075em !important;
      }
      #todayProjects.recommended-rail {
        display: flex !important;
        grid-template-columns: none !important;
        gap: 22px !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        scroll-snap-type: x mandatory !important;
        padding: 4px 4px 24px !important;
        scrollbar-width: thin;
      }
      #todayProjects.recommended-rail .project-card {
        flex: 0 0 min(540px, 86vw) !important;
        scroll-snap-align: start !important;
      }
      .section-note {
        margin: 0;
        color: #86868b;
        font-size: 16px;
        line-height: 1.5;
      }
      @media (max-width: 700px) {
        .page-title h1 {
          white-space: normal !important;
          font-size: clamp(36px, 12vw, 58px) !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-glow" aria-hidden="true"></div>
    <div class="shell">
      <header class="page-title">
        <p class="eyebrow">AI Opportunity Radar</p>
        <h1>AI Opportunity Radar</h1>
        <p class="page-subtitle">每日筛选最值得关注的 AI 项目、工具和机会信号。</p>
      </header>

      <nav class="tabs" aria-label="Dashboard sections">
        <button class="tab is-active" data-tab="today">今日工作台</button>
        <button class="tab" data-tab="history">历史日报</button>
        <button class="tab" data-tab="library">项目库</button>
      </nav>

      <main>
        <section class="panel is-active" id="today">
          <section class="hero-apple compact-hero">
            <div class="hero-copy-block">
              <p class="eyebrow" id="latestDate">--</p>
              <h2 id="todayTitle">今日重点信号</h2>
              <p class="hero-copy" id="todayTheme">暂无日报。</p>
              <a class="button button-dark hero-report-button" id="todayHtml" href="#" hidden>打开日报</a>
            </div>
            <div class="hero-visual" aria-label="Today signal overview">
              <div class="orb orb-blue"></div>
              <div class="orb orb-purple"></div>
              <div class="glass-device">
                <div class="device-topline"></div>
                <div class="device-main-score">
                  <span>机会热度</span>
                  <strong id="marketScore">--</strong>
                </div>
                <div class="device-stats">
                  <div>
                    <span>项目数量</span>
                    <strong id="projectCount">0</strong>
                  </div>
                  <div>
                    <span>状态</span>
                    <strong>Live</strong>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="mission-layout">
            <article class="mission-card">
              <p class="eyebrow">今日行动</p>
              <div class="mission" id="todayMission">ChatGPT 计划任务写入数据后会自动展示。</div>
            </article>
            <article class="top-project" id="topProject"></article>
          </section>

          <section class="summary-grid" id="summaryList"></section>

          <section class="workspace-head">
            <div>
              <p class="eyebrow">今日信号</p>
              <h2>今日推荐</h2>
              <p class="section-note">横向滑动查看今天最值得优先关注的项目。</p>
            </div>
            <div class="toolbar">
              <label class="search">
                <span>搜索</span>
                <input id="searchInput" type="search" placeholder="项目名、分类、行动..." />
              </label>
              <label class="select">
                <span>分类</span>
                <select id="categoryFilter">
                  <option value="">全部分类</option>
                </select>
              </label>
              <label class="select">
                <span>状态</span>
                <select id="statusFilter">
                  <option value="">全部状态</option>
                  <option value="favorite">收藏</option>
                  <option value="testing">测试中</option>
                  <option value="done">已完成</option>
                  <option value="dropped">已放弃</option>
                </select>
              </label>
            </div>
          </section>

          <div class="cards recommended-rail" id="todayProjects"></div>
        </section>

        <section class="panel" id="history">
          <div class="section-head">
            <div>
              <p class="eyebrow">历史记录</p>
              <h2>历史日报</h2>
              <p>按日期查看每日机会信号和原始 JSON 数据。</p>
            </div>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>

        <section class="panel" id="library">
          <div class="section-head">
            <div>
              <p class="eyebrow">机会池</p>
              <h2>项目库</h2>
              <p>汇总所有日报中的项目，查看出现次数、最近更新时间和状态。</p>
            </div>
          </div>
          <div class="cards compact" id="libraryProjects"></div>
        </section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty">
        <strong>暂无数据</strong>
        <p>请先写入 data/manifest.json 和 data/daily/YYYY-MM-DD.json。</p>
      </div>
    </template>

    <script src="assets/app.js?v=20260703-ui5"></script>
  </body>
</html>
