<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Opportunity Radar · 2026-07-18</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0}main{max-width:1040px;margin:auto;padding:48px 24px}h1{font-size:42px;margin:0 0 8px}.sub{color:#6e6e73;margin-bottom:32px}.mission,.card,.reject{background:white;border-radius:24px;padding:28px;margin:20px 0;box-shadow:0 8px 30px rgba(0,0,0,.06)}.rank{font-size:14px;color:#6e6e73}h2{font-size:28px;margin:10px 0 20px}p{line-height:1.75}a{color:#06c}.prompt{position:relative;background:#f5f5f7;border-radius:16px;padding:18px;margin:18px 0}pre{white-space:pre-wrap;font:14px/1.65 ui-monospace,SFMono-Regular,Menlo,monospace;margin:0;padding-right:32px}button{position:absolute;right:12px;top:10px;border:0;background:transparent;font-size:20px;cursor:pointer}li{margin:8px 0;line-height:1.55}</style></head><body><main id="app"><h1>AI Opportunity Radar</h1><div class="sub">2026-07-18 · Open-source AI Opportunity V1.5</div><p>正在载入日报…</p></main><script>const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));fetch('../../data/daily/2026-07-18.json').then(r=>r.json()).then(d=>{const cards=d.projects.map(p=>`<section class="card"><div class="rank">#${p.rank} · ${p.score} 分 · ${e(p.category.join(' · '))}</div><h2>${e(p.name)}</h2><p><strong>价值判断</strong><br>${e(p.value_insight)}</p><p><strong>解决问题</strong><br>${e(p.problem_solved)}</p><p><strong>与主流方案对比</strong><br>${e(p.mainstream_comparison)}</p><div class="prompt"><button onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText)" aria-label="复制提示词">⧉</button><pre>${e(p.codex_prompt)}</pre></div><p><strong>今日行动</strong><br>${e(p.today_action)}</p><p><strong>下一步机会</strong><br>${e(p.next_opportunity)}</p><ul>${p.evidence.map(x=>`<li><a href="${e(x.url)}">${e(x.source)}</a>：${e(x.note)}</li>`).join('')}</ul></section>`).join('');document.getElementById('app').innerHTML=`<h1>AI Opportunity Radar</h1><div class="sub">${e(d.date)} · ${e(d.version)}</div><section class="mission"><strong>今日验证</strong><p>${e(d.today_mission)}</p><ul>${d.summary.map(x=>`<li>${e(x)}</li>`).join('')}</ul></section>${cards}<section class="reject"><h2>未进入 Top 的候选</h2><ul>${d.rejected_candidates.map(x=>`<li><strong>${e(x.name)}</strong>：${e(x.reason)}</li>`).join('')}</ul></section>`}).catch(err=>document.querySelector('#app p').textContent='日报加载失败：'+err.message);</script></body></html>
