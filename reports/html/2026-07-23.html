<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open-source AI Opportunity · 2026-07-23</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0}main{max-width:1080px;margin:auto;padding:48px 24px 72px}.hero,.card,.reject{background:#fff;border:1px solid #e5e5ea;border-radius:26px;padding:30px;margin:20px 0;box-shadow:0 10px 34px rgba(0,0,0,.05)}h1{font-size:44px;line-height:1.05;margin:0 0 10px}.sub{color:#6e6e73;margin-bottom:28px}.rankline{display:flex;justify-content:space-between;gap:20px;align-items:center;color:#6e6e73;font-size:14px}.score{font-size:30px;font-weight:800;color:#1d1d1f}h2{font-size:28px;line-height:1.2;margin:14px 0 22px}.section{background:#f7f7f8;border-radius:18px;padding:16px 18px;margin:14px 0}.section strong{display:block;margin-bottom:6px}.today{border-left:4px solid #06c}.next{border-left:4px solid #22a06b}.links a{display:inline-block;margin:10px 8px 0 0;padding:9px 13px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:700}li{margin:8px 0;line-height:1.6}.evidence a{color:#06c;text-decoration:none}@media(max-width:720px){main{padding:28px 14px 54px}h1{font-size:34px}.hero,.card,.reject{padding:22px;border-radius:22px}.rankline{align-items:flex-start}.score{font-size:24px}}</style></head><body><main id="app"><h1>Open-source AI Opportunity</h1><div class="sub">2026-07-23 · V1.5</div><p>正在载入日报…</p></main><script>const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));fetch('../../data/daily/2026-07-23.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(d=>{const cards=d.projects.map(p=>`<section class="card"><div class="rankline"><span>#${e(p.rank)} · ${e((p.category||[]).join(' · '))}</span><span class="score">${e(p.score)}</span></div><h2>${e(p.name)}</h2><div class="section"><strong>核心判断</strong>${e(p.value_insight)}</div><div class="section"><strong>解决的问题</strong>${e(p.problem_solved)}</div><div class="section"><strong>主流方案对比</strong>${e(p.mainstream_comparison)}</div><div class="section today"><strong>今天可以做</strong>${e(p.today_action)}</div><div class="section next"><strong>后续机会</strong>${e(p.next_opportunity)}</div><ul class="evidence">${(p.evidence||[]).map(x=>`<li><a href="${e(x.url)}" target="_blank" rel="noreferrer">${e(x.source)}</a>：${e(x.note)}</li>`).join('')}</ul><div class="links"><a href="${e(p.github)}" target="_blank" rel="noreferrer">GitHub</a></div></section>`).join('');document.getElementById('app').innerHTML=`<section class="hero"><h1>Open-source AI Opportunity</h1><div class="sub">${e(d.date)} · ${e(d.version)}</div><p><strong>今日重点</strong></p><p>${e(d.today_mission)}</p><ul>${(d.summary||[]).map(x=>`<li>${e(x)}</li>`).join('')}</ul></section>${cards}<section class="reject"><h2>未进入 Top 的候选</h2><ul>${(d.rejected_candidates||[]).map(x=>`<li><strong>${e(x.name)}</strong>：${e(x.reason)}</li>`).join('')}</ul></section>`}).catch(err=>document.querySelector('#app p').textContent='日报加载失败：'+err.message);</script></body></html>
