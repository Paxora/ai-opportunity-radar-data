<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open-source AI Opportunity · 2026-07-22</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0}main{max-width:1080px;margin:auto;padding:48px 24px}h1{font-size:42px;line-height:1.05;margin:0 0 8px}.sub{color:#6e6e73;margin-bottom:32px}.hero,.card,.reject{background:#fff;border:1px solid #e5e5ea;border-radius:24px;padding:28px;margin:20px 0;box-shadow:0 8px 30px rgba(0,0,0,.05)}.rank{font-size:14px;color:#6e6e73}.score{float:right;font-size:28px;font-weight:800}h2{font-size:28px;line-height:1.2;margin:10px 0 20px}p{line-height:1.72}.section{background:#fafafa;border:1px solid #ededf0;border-radius:16px;padding:15px 16px;margin:14px 0}.label{font-weight:800;margin-bottom:6px}.links a{display:inline-block;margin:8px 8px 0 0;padding:8px 12px;background:#111;color:#fff;border-radius:999px;text-decoration:none;font-weight:700}li{margin:8px 0;line-height:1.55}@media(max-width:760px){h1{font-size:34px}.score{float:none;display:block;margin-bottom:8px}}</style></head><body><main id="app"><h1>Open-source AI Opportunity</h1><div class="sub">2026-07-22 · V1.5</div><p>正在载入日报…</p></main><script>const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));fetch('../../data/daily/2026-07-22.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{const cards=d.projects.map(p=>`<section class="card"><div class="score">${e(p.score)}</div><div class="rank">#${e(p.rank)} · ${e((p.category||[]).join(' · '))}</div><h2>${e(p.name)}</h2><div class="section"><div class="label">核心判断</div>${e(p.value_insight)}</div><div class="section"><div class="label">解决的问题</div>${e(p.problem_solved)}</div><div class="section"><div class="label">主流方案对比</div>${e(p.mainstream_comparison)}</div><div class="section"><div class="label">今天可以做</div>${e(p.today_action)}</div><div class="section"><div class="label">后续机会</div>${e(p.next_opportunity)}</div><ul>${(p.evidence||[]).map(x=>`<li><a href="${e(x.url)}" target="_blank" rel="noopener">${e(x.source)}</a>：${e(x.note)}</li>`).join('')}</ul><p class="links"><a href="${e(p.github)}" target="_blank" rel="noopener">GitHub</a></p></section>`).join('');document.getElementById('app').innerHTML=`<h1>Open-source AI Opportunity</h1><div class="sub">${e(d.date)} · ${e(d.version)}</div><section class="hero"><div class="label">今日重点</div><p>${e(d.today_mission)}</p><ul>${(d.summary||[]).map(x=>`<li>${e(x)}</li>`).join('')}</ul></section>${cards}<section class="reject"><h2>未进入 Top 的候选</h2><ul>${(d.rejected_candidates||[]).map(x=>`<li><strong>${e(x.name)}</strong>：${e(x.reason)}</li>`).join('')}</ul></section>`}).catch(err=>document.querySelector('#app p').textContent='日报加载失败：'+err.message);</script></body></html>
