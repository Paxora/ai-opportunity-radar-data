<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open-source AI Opportunity · 2026-07-24</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0}main{max-width:1080px;margin:auto;padding:48px 24px 72px}h1{font-size:42px;margin:0 0 8px;letter-spacing:-.04em}.sub{color:#6e6e73;margin-bottom:30px}.mission,.card,.reject{background:#fff;border-radius:24px;padding:28px;margin:20px 0;box-shadow:0 8px 30px rgba(0,0,0,.06)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:18px 0 28px}.summary div{background:#fff;border-radius:18px;padding:20px;line-height:1.55}.rank{font-size:14px;color:#6e6e73;font-weight:700}h2{font-size:28px;margin:10px 0 20px;letter-spacing:-.02em}.block{border-top:1px solid #ececf0;padding-top:15px;margin-top:15px}.block strong{display:block;margin-bottom:6px}.action{background:#eef6ff;border:0;border-radius:16px;padding:16px}.next strong{color:#7c3aed}p,li{line-height:1.7}a{color:#06c;text-decoration:none}.links{display:flex;gap:14px;flex-wrap:wrap;margin-top:18px}@media(max-width:800px){.summary{grid-template-columns:1fr}h1{font-size:34px}}</style></head><body><main id="app"><h1>Open-source AI Opportunity</h1><div class="sub">2026-07-24 · V1.5</div><p>正在载入日报…</p></main><script>const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));fetch('../../data/daily/2026-07-24.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(d=>{const cards=(d.projects||[]).map(p=>`<section class="card"><div class="rank">#${p.rank} · ${p.score} 分 · ${e((p.category||[]).join(' · '))}</div><h2>${e(p.name)}</h2><div class="block"><strong>核心判断</strong><p>${e(p.value_insight)}</p></div><div class="block"><strong>解决的问题</strong><p>${e(p.problem_solved)}</p></div><div class="block"><strong>主流方案对比</strong><p>${e(p.mainstream_comparison)}</p></div><div class="block action"><strong>今天可以做</strong><p>${e(p.today_action)}</p></div><div class="block next"><strong>后续机会</strong><p>${e(p.next_opportunity)}</p></div><div class="links"><a href="${e(p.github)}" target="_blank" rel="noreferrer">GitHub</a>${(p.evidence||[]).map(x=>`<a href="${e(x.url)}" target="_blank" rel="noreferrer">${e(x.source)}</a>`).join('')}</div></section>`).join('');const rejected=(d.rejected_candidates||[]).map(x=>`<li><strong>${e(x.name)}</strong>：${e(x.reason)}</li>`).join('');document.getElementById('app').innerHTML=`<h1>Open-source AI Opportunity</h1><div class="sub">${e(d.date)} · ${e(d.version)}</div><section class="mission"><strong>今日重点</strong><p>${e(d.today_mission)}</p></section><section class="summary">${(d.summary||[]).map(x=>`<div>${e(x)}</div>`).join('')}</section>${cards}<section class="reject"><h2>未进入 Top 的候选</h2><ul>${rejected}</ul></section>`}).catch(err=>document.querySelector('#app p').textContent='日报加载失败：'+err.message);</script></body></html>
