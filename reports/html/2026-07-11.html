<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2026-07-11 Open-source AI Opportunity</title><style>body{margin:0;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:1120px;margin:auto;padding:48px 24px}h1{font-size:clamp(38px,6vw,68px);letter-spacing:-.055em;margin:0}.sub{font-size:20px;color:#666;margin:12px 0 30px}.mission,.summary,article,.rejected{background:#fff;border-radius:24px;padding:26px;margin:20px 0;box-shadow:0 10px 35px #0000000b}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.summary p{margin:0}.rank{font-weight:800;color:#06c}.score{float:right}.meta{color:#666}.prompt{position:relative;background:#f5f5f7;border:1px solid #e5e5ea;border-radius:18px;padding:18px 58px 18px 18px;margin-top:16px}.prompt pre{white-space:pre-wrap;word-break:break-word;font:inherit;line-height:1.55;margin:0}.copy{position:absolute;right:12px;top:12px;width:36px;height:36px;border:0;border-radius:50%;cursor:pointer;font-size:18px}p{line-height:1.65}a{color:#06c;text-decoration:none}@media(max-width:760px){.summary{grid-template-columns:1fr}}</style></head><body><main><h1>Open-source AI Opportunity</h1><p class="sub">2026-07-11 · 有价值内容优先，不做工具榜</p><section class="mission"><b>今日任务</b><p id="mission"></p></section><section class="summary" id="summary"></section><section id="projects"></section><section class="rejected"><h2>未进入 Top</h2><div id="rejected"></div></section></main><script>const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));fetch('../../data/daily/2026-07-11.json').then(r=>r.json()).then(d=>{mission.textContent=d.today_mission;summary.innerHTML=d.summary.map(x=>`<p>${esc(x)}</p>`).join('');projects.innerHTML=d.projects.map(x=>`<article><div class="rank">#${x.rank}<span class="score">${x.score}</span></div><h2>${esc(x.name)}</h2><p class="meta">${esc(x.category.join(' · '))}</p><p><b>价值判断：</b>${esc(x.value_insight)}</p><p><b>解决问题：</b>${esc(x.problem_solved)}</p><p><b>主流对比：</b>${esc(x.mainstream_comparison)}</p><p><b>今日行动：</b>${esc(x.today_action)}</p><p><b>下一机会：</b>${esc(x.next_opportunity)}</p><div class="prompt"><button class="copy" title="复制提示词">⧉</button><pre>${esc(x.codex_prompt)}</pre></div><p><a href="${esc(x.github)}">GitHub</a></p></article>`).join('');document.querySelectorAll('.copy').forEach(b=>b.onclick=()=>{navigator.clipboard.writeText(b.nextElementSibling.innerText);b.textContent='✓';setTimeout(()=>b.textContent='⧉',1200)});rejected.innerHTML=d.rejected_candidates.map(x=>`<p><b>${esc(x.name)}</b>：${esc(x.reason)}</p>`).join('')}).catch(e=>{mission.textContent='日报数据加载失败：'+e.message});</script></body></html>
