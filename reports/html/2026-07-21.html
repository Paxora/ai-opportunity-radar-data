<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open-source AI Opportunity · 2026-07-21</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0}main{max-width:1080px;margin:auto;padding:48px 24px}h1{font-size:42px;margin:0 0 8px}.sub{color:#6e6e73;margin-bottom:32px}.mission,.card,.reject{background:white;border-radius:24px;padding:28px;margin:20px 0;box-shadow:0 8px 30px rgba(0,0,0,.06)}.rank{font-size:14px;color:#6e6e73}h2{font-size:28px;margin:10px 0 20px}p{line-height:1.75}.detail{background:#f5f5f7;border-radius:16px;padding:16px 18px;margin:14px 0}.detail strong{display:block;margin-bottom:6px}.links a{display:inline-block;margin:8px 8px 0 0;padding:8px 12px;background:#e8f2ff;color:#06c;border-radius:999px;text-decoration:none;font-weight:700}li{margin:8px 0;line-height:1.55}@media(max-width:760px){h1{font-size:34px}}</style></head><body><main id="app"><h1>Open-source AI Opportunity</h1><div class="sub">2026-07-21 · V1.5</div><p>正在载入日报…</p></main><script>const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));fetch('../../data/daily/2026-07-21.json').then(r=>r.json()).then(d=>{const cards=d.projects.map(p=>`<section class="card"><div class="rank">#${p.rank} · ${p.score} 分 · ${e(p.category.join(' · '))}</div><h2>${e(p.name)}</h2><div class="detail"><strong>核心判断</strong><p>${e(p.value_insight)}</p></div><div class="detail"><strong>解决的问题</strong><p>${e(p.problem_solved)}</p></div><div class="detail"><strong>主流方案对比</strong><p>${e(p.mainstream_comparison)}</p></div><div class="detail"><strong>今天可以做</strong><p>${e(p.today_action)}</p></div><div class="detail"><strong>后续机会</strong><p>${e(p.next_opportunity)}</p></div><p class="links"><a href="${e(p.github)}" target="_blank" rel="noopener">GitHub</a></p><ul>${p.evidence.map(x=>`<li><a href="${e(x.url)}">${e(x.source)}</a>：${e(x.note)}</li>`).join('')}</ul></section>`).join('');document.getElementById('app').innerHTML=`<h1>Open-source AI Opportunity</h1><div class="sub">${e(d.date)} · ${e(d.version)}</div><section class="mission"><strong>今日行动</strong><p>${e(d.today_mission)}</p><ul>${d.summary.map(x=>`<li>${e(x)}</li>`).join('')}</ul></section>${cards}<section class="reject"><h2>未进入 Top 的候选</h2><ul>${d.rejected_candidates.map(x=>`<li><strong>${e(x.name)}</strong>：${e(x.reason)}</li>`).join('')}</ul></section>`}).catch(err=>document.querySelector('#app p').textContent='日报加载失败：'+err.message);</script></body></html>
