<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open-source AI Opportunity · 2026-07-20</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0}main{max-width:1040px;margin:auto;padding:48px 24px}h1{font-size:44px;line-height:1.05;margin:0 0 10px}.sub{color:#6e6e73;margin-bottom:30px}.mission,.card,.reject{background:#fff;border-radius:28px;padding:30px;margin:22px 0;box-shadow:0 10px 34px rgba(0,0,0,.055)}.mission{background:linear-gradient(135deg,#fff,#f6f8ff)}.rank{font-size:14px;color:#6e6e73;font-weight:700}h2{font-size:29px;line-height:1.2;margin:10px 0 22px}p{line-height:1.72}.detail{border-top:1px solid #ececf0;padding-top:16px;margin-top:16px}.detail strong{display:block;font-size:13px;letter-spacing:.04em;color:#6e6e73;margin-bottom:7px}.detail p{margin:0}.detail.value{border:0;background:#f5f5f7;border-radius:20px;padding:18px 20px}.detail.action{border:0;background:#eef6ff;border-radius:18px;padding:16px 18px}.detail.action strong{color:#06c}.detail.next strong{color:#7c3aed}a{color:#06c}.evidence{margin-top:20px;padding-top:16px;border-top:1px solid #ececf0}li{margin:8px 0;line-height:1.55}@media(max-width:760px){main{padding:28px 16px}h1{font-size:34px}.mission,.card,.reject{padding:22px;border-radius:22px}}</style></head><body><main id="app"><h1>Open-source AI Opportunity</h1><div class="sub">2026-07-20 · Value-first</div><p>正在载入日报…</p></main><script>const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));fetch('../../data/daily/2026-07-20.json').then(r=>r.json()).then(d=>{const cards=d.projects.map(p=>`<section class="card"><div class="rank">#${p.rank} · ${p.score} 分 · ${e((p.category||[]).join(' · '))}</div><h2>${e(p.name)}</h2><div class="detail value"><strong>核心判断</strong><p>${e(p.value_insight)}</p></div><div class="detail"><strong>解决的问题</strong><p>${e(p.problem_solved)}</p></div><div class="detail"><strong>主流方案对比</strong><p>${e(p.mainstream_comparison)}</p></div><div class="detail action"><strong>今天可以做</strong><p>${e(p.today_action)}</p></div><div class="detail next"><strong>后续机会</strong><p>${e(p.next_opportunity)}</p></div><ul class="evidence">${(p.evidence||[]).map(x=>`<li><a href="${e(x.url)}">${e(x.source)}</a>：${e(x.note)}</li>`).join('')}</ul></section>`).join('');document.getElementById('app').innerHTML=`<h1>Open-source AI Opportunity</h1><div class="sub">${e(d.date)} · ${e(d.version)}</div><section class="mission"><strong>今日重点</strong><p>${e(d.today_mission)}</p><ul>${(d.summary||[]).map(x=>`<li>${e(x)}</li>`).join('')}</ul></section>${cards}<section class="reject"><h2>未进入 Top 的候选</h2><ul>${(d.rejected_candidates||[]).map(x=>`<li><strong>${e(x.name)}</strong>：${e(x.reason)}</li>`).join('')}</ul></section>`}).catch(err=>document.querySelector('#app p').textContent='日报加载失败：'+err.message);</script></body></html>
